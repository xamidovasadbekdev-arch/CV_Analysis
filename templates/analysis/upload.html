{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">Upload Your CV</h4>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">CV (PDF)</label>
                        {{ form.resume }}
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Analyze</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
