{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="mb-4">CV Analysis Result</h4>
                <div class="bg-white border rounded p-3" style="white-space: pre-wrap;">
                    {{ analysis.result }}
                </div>
                <a href="{% url 'upload' %}" class="btn btn-dark mt-4 w-100">Upload Another CV</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
